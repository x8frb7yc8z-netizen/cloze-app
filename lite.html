<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
<title>AI 意群同步播放器 - White Edition</title>
<style>
#current-floating-text .custom-bold{color:#ffffff!important;text-shadow:0 0 3px rgba(0,0,0,0.8);}
#current-floating-text{background:transparent!important;box-shadow:none!important;text-shadow:1px 1px 0 #000,-1px -1px 0 #000,1px -1px 0 #000,-1px 1px 0 #000,2px 2px 4px rgba(0,0,0,0.8);}
html,body{width:100%;margin:0;padding:0;overflow-x:hidden!important;position:relative;}
#status,.status-dot{display:none!important;}
/* 1. 移除容器内边距，允许内容撑满全屏 */
.transcript-container {flex: 1;overflow-y: auto;overflow-x: hidden !important;padding: 0 !important; /* 原为 20px，改为 0 */background: #ffffff;box-sizing: border-box;}
.custom-bold{font-weight:700!important;color:#000!important;text-underline-offset:4px;}
:root{--primary:#00a1d6;--primary-light:rgba(0,161,214,0.08);--bg:#ffffff;--header-bg:rgba(255,255,255,0.9);--panel:#f5f5f7;--text-main:#1d1d1f;--text-dim:#86868b;--border:#d2d2d7;--line-hover:#f0f0f2;}
body {
    font-family: -apple-system, "SF Pro Display", "PingFang SC", sans-serif;
    background: var(--bg);
    color: var(--text-main);
    margin: 0;
    display: flex;
    flex-direction: column;
    /* 核心修复：使用 dvh 适配动态工具栏 */
    height: 100vh;
    height: 100dvh; 
    overflow: hidden;
    /* 必须保留 fixed，否则 iOS 滑动字幕时容易带动整个网页 */
    position: fixed; 
    width: 100%;
}
.header{height:0;padding:0;border:none;}
.status-dot{width:8px;height:8px;border-radius:50%;background:#d2d2d7;display:inline-block;}
.status-dot.active{background:#34c759;box-shadow:0 0 6px rgba(52,199,89,0.5);}
#status{font-size:13px;color:var(--text-dim);flex-grow:1;}
.btn-upload{position:absolute;top:10px;right:10px;z-index:200;background:rgba(255,255,255,0.2)!important;color:white!important;border:none!important;backdrop-filter:blur(5px);opacity:0.3;transition:opacity 0.3s;}
.btn-upload:hover{opacity:1;background:rgba(255,255,255,0.4)!important;}
.controls-group{position:absolute;top:10px;right:10px;z-index:200;display:flex;gap:8px;align-items:center;}
.controls-group .btn-upload{position:static;}
#video-hint{background:rgba(0,161,214,0.9);color:white;font-size:12px;padding:4px 10px;border-radius:4px;white-space:nowrap;display:none;}
input[type="file"]{display:none;}
.main-content{flex:1;display:flex;flex-direction:column;overflow:hidden;}
.action-bar{border-bottom: 1px solid #eee;position:sticky;top:0;left:0;width:100%;height:35px;z-index:1000;display:flex;background:#fff;border-bottom:1px solid #eee;box-shadow:0 2px 5px rgba(0,0,0,0.02);padding:0;}
.action-bar .action-btn:nth-child(1){background:#e3f2fd;color:#1d1d1f;}
.action-bar .action-btn:nth-child(2){background:#e8f5e9;color:#1d1d1f;}
.action-bar .action-btn{flex:1;height:100%;border:none;border-right:1px solid #f0f0f0;background:#fff;font-size:13px;font-weight:600;color:#444;cursor:pointer;transition:all 0.2s ease;display:flex;align-items:center;justify-content:center;padding:0;border-radius:0;}
.action-bar .action-btn:nth-child(3):hover{background:#fff8e1;color:#f57c00;}
.action-bar .action-btn:hover{background:#f5f5f7;color:var(--primary);}
.action-bar .action-btn:active{background:#eeeeee;}
.action-btn{padding:6px 14px;border-radius:8px;border:1px solid #d2d2d7;background:#fff;font-size:13px;color:#1d1d1f;cursor:pointer;transition:all 0.2s;font-family:inherit;}
.action-btn:hover{background:#f5f5f7;border-color:var(--primary);color:var(--primary);}
.video-wrapper {padding-top: env(safe-area-inset-top); width: 100vw;background: #000 !important;flex: 0 0 auto;box-shadow:position: relative;overflow: hidden;line-height: 0;font-size: 0;}
video {width: 101% !important;margin-left: -0.5% !important; margin-top: 0; margin-bottom: 0;object-fit: contain;max-height: 45vh;display: block;border: none !important;outline: none !important;-webkit-tap-highlight-color: transparent;}
.line {
    box-sizing: border-box; /* 确保 padding 不撑破宽度 */
    padding: 3px 0;         /* 仅保留上下间距，左右设为 0 */
    margin: 0;              /* 移除居中边距 */
    border-bottom: 1px solid #f2f2f7;
    width: 100%;            /* 撑满父容器宽度 */
    max-width: none;        /* 移除原有的 800px 限制 */
    cursor: default;
    text-align: center;     /* 保持文字水平居中，如果想靠左可改为 left */
    background: transparent !important;
    display: flex;
    flex-direction: column; 
    align-items: center;
    justify-content: center;
}
.play-btn {
    width: 32px;              /* 稍微缩小按钮尺寸 (原 40px) */
    height: 32px;
    margin: 4px 0 0 0;        /* 显著缩小文字与按钮之间的间距 (原 10px) */
    border-radius: 50%;
    border: 1px solid #d2d2d7;
    background: #fff;
    color: #86868b;
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    font-size: 14px;          /* 稍微缩小图标大小 */
    transition: all 0.2s;
    flex-shrink: 0;
    user-select: none;
    -webkit-user-select: none;
}
.play-btn:hover{background:#f5f5f7;color:var(--primary);border-color:var(--primary);}
.line.active .play-btn{background:var(--primary);color:#fff;border-color:var(--primary);box-shadow:0 0 8px rgba(0,161,214,0.4);}
.line:hover{background:var(--line-hover);border-color:var(--border);}
.time-box{display:inline-block!important;font-family:"SF Mono",monospace;font-size:10px;color:#ccc;background:#f0f0f2;padding:2px 6px;border-radius:4px;margin-bottom:8px;opacity:0.6;}
.content {
    line-height: 1; /* 稍微增加行高，方便点击 */
    font-size: 30px;
    transition: none !important;
    font-weight: 400 !important;
    color: #1d1d1f;
    width: 100%;
    /* 核心修复：禁用 Safari 双击缩放，允许立即触发 JS 事件 */
    touch-action: manipulation !important;
    -webkit-user-select: text !important;
    user-select: text !important;
    cursor: pointer;
}
.line.active .content{font-weight:400!important;transform:none!important;color:#000;}
.empty-state{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;color:var(--text-dim);text-align:center;}
    </style>
</head>

<div class="header"><div class="status-dot" id="dot"></div><span id="status">等待加载...</span><div class="controls-group"><div id="video-hint"></div><label class="btn-upload">🎥<input type="file" id="videoInput" accept="video/*"></label><label class="btn-upload">📝<input type="file" id="subtitleManualInput" accept=".srt,.txt,.vtt"></label></div></div>
<div class="video-wrapper" style="position: relative; width: 100%; background: #000; overflow: hidden;"><video id="videoPlayer" playsinline webkit-playsinline></video><div id="video-touch-overlay" style="position:absolute;top:0;left:0;width:100%;height:100%;z-index:5;background:rgba(0,0,0,0);-webkit-tap-highlight-color:transparent;"></div><div id="video-overlay-subtitle" style="position:absolute;bottom:0%;left:0;width:100%;text-align:center;pointer-events:none;z-index:10;padding:0 20px;box-sizing:border-box;"><div id="current-floating-text" style="display:none;background:rgba(0,0,0,0.6);color:white;font-size:24px;padding:5px 15px;border-radius:8px;pointer-events:auto;user-select:text;-webkit-user-select:text;line-height:1;cursor:text;max-width:85%;word-wrap:break-word;margin:0 auto;"></div></div></div>
<div class="action-bar"><button class="action-btn" onclick="scrollToActive()">🎯 当前</button><button class="action-btn" id="toggle-controls-btn" onclick="toggleNativeControls()">▶️ 控件</button><button class="action-btn" onclick="boldSelectedText()"><b>B</b> 粗体</button><button class="action-btn" onclick="searchGoogleImages()">🖼️ 图片</button></div>
<div class="transcript-container" id="transcript"><div class="empty-state"><p>请在 Anki 中填写“字幕内容”<br>或手动上传视频与字幕</p></div></div>
<div id="image-preview-container" style="position:fixed;top:100%;left:0;width:100%;height:100%;background:#fff;z-index:2000;transition:top 0.3s cubic-bezier(0.4,0,0.2,1);display:flex;flex-direction:column;"><div class="preview-header" style="display:flex;justify-content:space-between;align-items:center;padding:10px 15px;background:#f1f3f4;border-bottom:1px solid #ddd;flex-shrink:0;"><span id="preview-word-title" style="font-weight:bold;color:#0288d1;font-size:14px;">图片搜索</span><button onclick="closeImagePreview()" style="border:none;background:#eee;border-radius:4px;padding:4px 12px;font-size:12px;cursor:pointer;">关闭</button></div><div class="preview-content" style="flex:1;overflow:hidden;"><iframe id="preview-iframe" style="width:100%;height:100%;border:none;" src=""></iframe></div></div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getDatabase, ref, update, get, child } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";
      
    const firebaseConfig = {
      apiKey: "AIzaSyDQwjomxjLURd0nWmS0RuhkaecXISqALzs",
      authDomain: "cloze-master-pro.firebaseapp.com",
      databaseURL: "https://cloze-master-pro-default-rtdb.asia-southeast1.firebasedatabase.app",
      projectId: "cloze-master-pro",
      storageBucket: "cloze-master-pro.firebasestorage.app",
      messagingSenderId: "697808901954",
      appId: "1:697808901954:web:32455d94bf67e522e01adb"
    };
  
    const fbApp = initializeApp(firebaseConfig);
    const db = getDatabase(fbApp);
  
    // --- 全局状态锁 ---
    let isSyncingFromServer = false;
  
    window.getDocId = function () {
      const urlParams = new URLSearchParams(window.location.search);
      const customId = urlParams.get('customid');
      return (customId && customId.trim() !== "") ? "anki_" + customId.trim() : null;
    };
  
    window.syncContentUpload = async function() {
      if (isSyncingFromServer) return; // 下载期间禁止上传
      const id = window.getDocId();
      if (!id) return;
      const transcript = document.getElementById('transcript');
      
      const boldSegments = Array.from(transcript.querySelectorAll('.line'))
          .filter(line => line.querySelector('.custom-bold')) 
          .map(line => ({
              time: line.dataset.time,
              html: line.querySelector('.content').innerHTML
          }));
  
      update(ref(db, 'video_sync/' + id), {
          markedLines: boldSegments,
          content_ts: Date.now()
      });
    };
  
    window.syncProgressUpload = async function() {
      if (isSyncingFromServer) return; // 下载期间禁止上传
      const id = window.getDocId();
      if (!id) return;
      const transcript = document.getElementById('transcript');
      const scrollPercent = transcript.scrollTop / (transcript.scrollHeight - transcript.clientHeight);
      if (isNaN(scrollPercent)) return;
  
      update(ref(db, 'video_sync/' + id), {
          scrollPos: scrollPercent,
          progress_ts: Date.now()
      });
    };
  
    window.syncDownload = async function() {
      const id = window.getDocId();
      if (!id) return;
      
      isSyncingFromServer = true; // 【加锁】
  
      try {
          const snapshot = await get(child(ref(db), 'video_sync/' + id));
          if (snapshot.exists()) {
              const data = snapshot.val();
              
              if (data.markedLines) {
                  data.markedLines.forEach(item => {
                      const targetLine = document.querySelector(`.line[data-time="${item.time}"] .content`);
                      if (targetLine) targetLine.innerHTML = item.html;
                  });
                  if(typeof rebindEvents === 'function') rebindEvents(); 
              }
  
              if (data.scrollPos !== undefined) {
                  const transcript = document.getElementById('transcript');
                  setTimeout(() => {
                      transcript.scrollTop = data.scrollPos * (transcript.scrollHeight - transcript.clientHeight);
                      if(typeof updateStatus === 'function') updateStatus("云端同步完成", true);
                  }, 400);
              }
          }
      } catch (e) {
          console.error("同步下载失败", e);
      } finally {
          // 等待一段时间再解锁，防止滚动事件触发 syncProgressUpload
          setTimeout(() => { isSyncingFromServer = false; }, 1500);
      }
    };
  </script>
<script>
    let scrollTimer = null;
    let controlsTimer = null;
    let isLongPress = false;
    let touchStartX = 0;
    let touchStartY = 0;
    const container = document.querySelector('.transcript-container');
    const SWIPE_THRESHOLD = 40; // 划动最小像素阈值
    const video = document.getElementById('videoPlayer');
    const touchOverlay = document.getElementById('video-touch-overlay');
    const transcript = document.getElementById('transcript');
    const status = document.getElementById('status');
    const dot = document.getElementById('dot');
    const videoHint = document.getElementById('video-hint');
    const transcriptContainer = document.querySelector('.transcript-container');
function toggleNativeControls() {
    const video = document.getElementById('videoPlayer');
    const touchOverlay = document.getElementById('video-touch-overlay');
    const btn = document.getElementById('toggle-controls-btn');
    if (controlsTimer) clearTimeout(controlsTimer);
    video.controls = true;
    touchOverlay.style.pointerEvents = 'none';
    btn.style.color = 'var(--primary)';
    btn.innerText = "🔒 控件已开";
    updateStatus("已唤起系统控件，5秒后自动关闭", true);
    controlsTimer = setTimeout(() => {
        video.controls = false;
        touchOverlay.style.pointerEvents = 'auto';
        btn.style.color = '';
        btn.innerText = "🛠️ 播放控件";
        updateStatus("已恢复纯净模式", true);
    }, 5000);
}
touchOverlay.addEventListener('touchstart', (e) => {
    touchStartX = e.touches[0].clientX;
    touchStartY = e.touches[0].clientY;
}, { passive: true });
    //
touchOverlay.addEventListener('touchend', (e) => {
    // 拦截：如果正在选词，直接跳出
    const selection = window.getSelection();
    if (selection && selection.toString().trim().length > 0) return;

    const touchEndX = e.changedTouches[0].clientX;
    const touchEndY = e.changedTouches[0].clientY;
    const deltaX = touchEndX - touchStartX;
    const deltaY = touchEndY - touchStartY;

    if (Math.abs(deltaX) < 10 && Math.abs(deltaY) < 10) {
        if (video.paused) {
            video.play().catch(err => console.log("播放被拦截", err));
        } else {
            video.pause();
        }
    } else if (Math.abs(deltaX) > Math.abs(deltaY) * 1.5 && Math.abs(deltaX) > SWIPE_THRESHOLD) {
        if (deltaX < 0) {
            video.currentTime = Math.max(0, video.currentTime - 2);
        } else {
            video.pause();
        }
    }
});

// 监听字幕容器滚动停止
const transcriptDiv = document.getElementById('transcript');
transcriptDiv.addEventListener('scroll', () => {
    clearTimeout(scrollTimer);
    scrollTimer = setTimeout(() => {
        // --- 核心修改：此处仅触发滚动位置上传，不涉及 HTML 标记 ---
        if (window.syncProgressUpload) {
            window.syncProgressUpload();
            console.log("阅读位置已同步");
        }
    }, 1500); 
});
document.addEventListener('touchstart', (e) => {
    touchStartX = e.touches[0].clientX;
    touchStartY = e.touches[0].clientY;
}, { passive: true });
    //
document.addEventListener('touchend', (e) => {
    // 关键拦截：如果用户正在选中文字，则不执行任何视频控制逻辑
    const selection = window.getSelection();
    if (selection && selection.toString().trim().length > 0) {
        // 发现有选中的内容，直接退出函数，不执行下面的播放/暂停逻辑
        return; 
    }

    const touchEndX = e.changedTouches[0].clientX;
    const touchEndY = e.changedTouches[0].clientY;
    const deltaX = touchEndX - touchStartX;
    const deltaY = touchEndY - touchStartY;

    // 只有在没有选中文字的情况下，才判断是否执行划动手势
    if (Math.abs(deltaX) > Math.abs(deltaY) * 1.5 && Math.abs(deltaX) > SWIPE_THRESHOLD) {
        if (deltaX < 0) {
            video.currentTime = Math.max(0, video.currentTime - 2);
            updateStatus("⏪ 快退 2s", true);
        } else {
            // 这里是控制播放/暂停的核心点
            if (video.paused) {
                video.play();
                updateStatus("▶️ 播放", true);
            } else {
                video.pause();
                updateStatus("⏸ 暂停", true);
            }
        }
        
        setTimeout(() => {
            const lastVideoName = localStorage.getItem('last_video_name');
            updateStatus(lastVideoName ? "视频已加载" : "准备就绪", true);
        }, 1000);
    }
}, { passive: true });
    //
    transcriptContainer.addEventListener('scroll', () => {
    localStorage.setItem('last_scroll_pos', transcriptContainer.scrollTop);
});
    function updateStatus(msg, active = false) {
        status.innerText = msg;
        dot.className = active ? 'status-dot active' : 'status-dot';
    }


window.addEventListener('DOMContentLoaded', () => {
    const cachedSubs = localStorage.getItem('last_subtitles');
    if (cachedSubs) {
        processSubtitleContent(cachedSubs, true);
    }
    const lastVideoName = localStorage.getItem('last_video_name');
    
    // 移除 lastTime 相关的提示
    if (lastVideoName) {
        videoHint.innerText = `待加载: ${lastVideoName}`; // 不再显示上次时间
        videoHint.style.display = 'block';
    }
});

document.getElementById('videoInput').addEventListener('change', (e) => {
    const file = e.target.files[0];
    if (file) {
        localStorage.setItem('last_video_name', file.name);
        videoHint.style.display = 'none';
        video.src = URL.createObjectURL(file);
        updateStatus("视频已加载", true);
        
        // 确保视频就绪后不执行任何跳转，直接从头开始
        video.onloadeddata = () => {
            console.log("新视频就绪，进度保持为 0");
        };
    }
});

document.getElementById('subtitleManualInput').addEventListener('change', (e) => {
    const file = e.target.files[0];
    if (file) {
        const reader = new FileReader();
        reader.onload = (event) => {
            const content = event.target.result;
            processSubtitleContent(content); 
            updateStatus("字幕已手动加载", true);
        };
        reader.readAsText(file);
    }
});
function processSubtitleContent(content, isFromCache = false) {
    // 1. 缓存原始文本
    if (!isFromCache) {
        localStorage.setItem('last_subtitles', content);
    }

    // 2. 解析并渲染（渲染过程已包含点击、双击、单句播放的事件绑定）
    const cues = parseSubtitle(content);
    renderSubtitles(cues);

    // 3. 恢复阅读位置或播放进度
    const lastScrollPos = localStorage.getItem('last_scroll_pos');
    const lastTime = localStorage.getItem('last_video_time');

    setTimeout(() => {
        if (lastScrollPos && parseFloat(lastScrollPos) > 0) {
            // 优先恢复上次手动滚动的具体位置
            transcriptContainer.scrollTop = parseFloat(lastScrollPos);
        } else if (lastTime) {
            // 如果没有滚动记录，则根据视频时间定位到对应行
            const savedTime = parseFloat(lastTime);
            const lines = document.querySelectorAll('.line');
            for (let i = 0; i < lines.length; i++) {
                const start = parseFloat(lines[i].dataset.time);
                const next = lines[i+1] ? parseFloat(lines[i+1].dataset.time) : Infinity;
                
                if (savedTime >= start && savedTime < next) {
                    lines[i].classList.add('active');
                    lines[i].scrollIntoView({ behavior: 'auto', block: 'center' });
                    break;
                }
            }
        }
    }, 150); 

    // 4. 触发云端内容下载/同步
    setTimeout(() => {
        if (window.syncDownload) window.syncDownload();
    }, 500);
}
function parseSubtitle(data) {
    let cleanData = data.replace(/<br\s*\/?>/gi, "\n")
                        .replace(/<\/p>|<\/div>/gi, "\n")
                        .replace(/<\/?[^>]+(>|$)/g, "");
    const doc = new DOMParser().parseFromString(cleanData, 'text/html');
    cleanData = doc.documentElement.textContent;
    const cues = [];
    const lines = cleanData.split('\n').map(l => l.trim()).filter(l => l !== "");
    for (let i = 0; i < lines.length; i++) {
        const line = lines[i];
        const timeMatch = line.match(/(\d{1,2}:\d{2}:\d{2}[.,]\d{3})\s*-->\s*(\d{1,2}:\d{2}:\d{2}[.,]\d{3})/);
        if (timeMatch) {
            const start = timeToSeconds(timeMatch[1]);
            let textParts = [];
            let j = i + 1;
            while (j < lines.length && !lines[j].match(/-->/)) {
                const contentLine = lines[j];
                if (!/^\d+$/.test(contentLine)) {
                    textParts.push(contentLine);
                }
                j++;
            }
            // 关键修改：使用 <br> 连接多行文本以保留分行效果
            const text = textParts.join('<br>').trim();
            if (text) {
                cues.push({ start, text });
            }
            i = j - 1; 
        }
    }
    return cues;
}
    function timeToSeconds(timeStr) {
        const parts = timeStr.trim().replace(',', '.').split(':');
        if (parts.length === 3) return (+parts[0]) * 3600 + (+parts[1]) * 60 + (+parts[2]);
        return (+parts[0]) * 60 + (+parts[1]);
    }
function renderSubtitles(cues) {
    const transcript = document.getElementById('transcript');
    if (!transcript) return;
    transcript.innerHTML = ''; 

    if (!cues || cues.length === 0) {
        transcript.innerHTML = '<div class="empty-state"><p>暂无字幕内容</p></div>';
        return;
    }

    cues.forEach((cue) => {
        const div = document.createElement('div');
        div.className = 'line';
        div.dataset.time = cue.start;
        div.innerHTML = `
          <div class="content">${cue.text}</div>
          <div class="play-btn" title="从此处播放">▶</div>
        `;
        transcript.appendChild(div);
    });

    // 渲染完毕后，统一由 rebindEvents 绑定所有交互
    rebindEvents();
}

function copyToClipboard(text, msg) {
    // 创建隐藏文本域
    const textArea = document.createElement("textarea");
    textArea.value = text;
    // 确保在 iOS 上不会导致页面跳动
    textArea.style.position = "fixed";
    textArea.style.left = "-9999px";
    textArea.style.top = "0";
    document.body.appendChild(textArea);
    
    // 选中文字
    textArea.focus();
    textArea.select();
    textArea.setSelectionRange(0, 9999); // 兼容 iOS

    let success = false;
    try {
        // 同步执行复制（Safari 最稳的方法）
        success = document.execCommand('copy');
    } catch (err) {
        success = false;
    }
    document.body.removeChild(textArea);

    // 如果同步失败且有现代 API，尝试 API
    if (!success && navigator.clipboard) {
        navigator.clipboard.writeText(text).catch(() => {});
    }

    updateStatus(msg, true);
    setTimeout(() => {
        const lastVideoName = localStorage.getItem('last_video_name');
        updateStatus(lastVideoName ? "视频已加载" : "准备就绪", true);
    }, 1500);
}
function scrollToActive() {
    const activeLine = document.querySelector('.line.active');
    if (activeLine) {
        activeLine.scrollIntoView({ 
            behavior: 'smooth', 
            block: 'center' 
        });
        updateStatus("已定位到当前播放位置", true);
    } else {
        updateStatus("视频未在播放匹配的字幕行", false);
    }
}

function boldSelectedText() {
    const sel = window.getSelection();
    if (!sel || sel.isCollapsed) return;
    const range = sel.getRangeAt(0);
    if (!range.commonAncestorContainer.parentElement.closest('.content')) return;

    const bolds = document.querySelectorAll('.custom-bold');
    let matched = false;
    bolds.forEach(b => {
        if (sel.containsNode(b, true)) {
            const p = b.parentNode;
            while (b.firstChild) p.insertBefore(b.firstChild, b);
            p.removeChild(b);
            p.normalize();
            matched = true;
        }
    });

    if (!matched) {
        const span = document.createElement('span');
        span.className = 'custom-bold';
        span.appendChild(range.extractContents());
        range.insertNode(span);
    }
    sel.removeAllRanges();

    // --- 核心修改：此处仅触发内容上传，不涉及滚动位置 ---
    if (window.syncContentUpload) {
        window.syncContentUpload();
        updateStatus("标记已云端同步", true);
    }
}

function saveCurrentTranscript() {
    const transcript = document.getElementById('transcript');
    if (transcript) {
        localStorage.setItem('last_subtitles_html', transcript.innerHTML);
    }
}

function rebindEvents() {
    const lines = document.querySelectorAll('.line');
    lines.forEach((line, i) => {
        const contentArea = line.querySelector('.content');
        if (!contentArea) return;

        // 核心：先清除旧事件监听，防止重复叠加
        const newContent = contentArea.cloneNode(true);
        contentArea.parentNode.replaceChild(newContent, contentArea);

        let clickTimer = null;

        newContent.addEventListener('click', (e) => {
            e.stopPropagation();

            // e.detail 在电脑和手机 Safari/Chrome 上均代表点击次数
            if (e.detail === 1) {
                clickTimer = setTimeout(() => {
                    const selection = window.getSelection();
                    // 仅在未手动选择大段文字时执行单词提取
                    if (selection.toString().trim().length === 0) {
                        let range = document.caretRangeFromPoint ? 
                                    document.caretRangeFromPoint(e.clientX, e.clientY) : null;
                        if (range) {
                            selection.removeAllRanges();
                            selection.addRange(range);
                            selection.modify('move', 'backward', 'word');
                            selection.modify('extend', 'forward', 'word');
                            const word = selection.toString().trim().replace(/[.,!?;:"]/g, '');
                            if (word && word.length < 25) {
                                copyToClipboard(word, "已复制单词: " + word);
                            }
                        }
                    }
                    clickTimer = null;
                }, 250); // 延迟 250ms 等待双击
            } 
            else if (e.detail === 2) {
                // 双击：清除单击定时器，执行整句复制
                if (clickTimer) clearTimeout(clickTimer);
                const fullText = newContent.innerText.trim();
                copyToClipboard(fullText, "已复制整句内容");
                
                // 视觉全选效果
                const selection = window.getSelection();
                const range = document.createRange();
                range.selectNodeContents(newContent);
                selection.removeAllRanges();
                selection.addRange(range);
            }
        });

        // 重新绑定播放按钮
        const btn = line.querySelector('.play-btn');
        if (btn) {
            btn.onclick = (e) => {
                e.stopPropagation();
                const cueStart = parseFloat(line.dataset.time);
                const nextLine = lines[i + 1];
                const nextTime = nextLine ? parseFloat(nextLine.dataset.time) : cueStart + 5;

                video.dataset.singlePlayMode = "true";
                video.dataset.stopAt = nextTime;
                video.currentTime = cueStart;
                video.play();
                
                document.querySelector('.line.active')?.classList.remove('active');
                line.classList.add('active');
                updateStatus("🔂 单句播放中...", true);
            };
        }
    });
}
    
    function setActiveLine(currentTime) {
        const lines = document.querySelectorAll('.line');
        let targetLine = null;

        lines.forEach((line, i) => {
            const start = parseFloat(line.dataset.time);
            const next = lines[i+1] ? parseFloat(lines[i+1].dataset.time) : Infinity;
            if (currentTime >= start && currentTime < next) {
                targetLine = line;
            }
        });
        if (targetLine && !targetLine.classList.contains('active')) {
            document.querySelector('.line.active')?.classList.remove('active');
            targetLine.classList.add('active');
            targetLine.scrollIntoView({ behavior: 'smooth', block: 'center' });
        }
    }
    function formatTime(s) {
        return new Date(s * 1000).toISOString().substr(14, 5);
    }
video.addEventListener('timeupdate', () => {
    const currentTime = video.currentTime;
    const lines = document.querySelectorAll('.line');
    if (lines.length === 0) return;

    // 1. 处理单句播放停止
    if (video.dataset.singlePlayMode === "true") {
        const stopAt = parseFloat(video.dataset.stopAt);
        if (currentTime >= stopAt - 0.1) { 
            video.pause();
            video.currentTime = stopAt - 0.1; // 保持在当前句末尾
            video.dataset.singlePlayMode = "false"; 
            updateStatus("✅ 播放完毕", true);
            return;
        }
    }

    // 2. 自动高亮与滚动
    let currentLine = null;
    lines.forEach((line, i) => {
        const start = parseFloat(line.dataset.time);
        const next = lines[i+1] ? parseFloat(lines[i+1].dataset.time) : start + 10;
        if (currentTime >= start && currentTime < next) {
            currentLine = line;
        }
    });

    if (currentLine && !currentLine.classList.contains('active')) {
        document.querySelector('.line.active')?.classList.remove('active');
        currentLine.classList.add('active');
        currentLine.scrollIntoView({ behavior: 'smooth', block: 'center' });
        
        const floatingText = document.getElementById('current-floating-text');
        if (floatingText) {
            floatingText.innerHTML = currentLine.querySelector('.content').innerHTML;
        }
    }
});

    });
function searchGoogleImages() { // 保持原函数名或改为 searchBingImages
    const selection = window.getSelection();
    const selectedText = selection.toString().trim();
    if (!selectedText) {
        updateStatus("请先选中单词或短语", false);
        return;
    }
    const query = selectedText.replace(/[.,!?;:"]/g, '');
    const url = `https://www.bing.com/images/search?q=${encodeURIComponent(query)}&adlt=strict&form=HDRSC2`;
    const container = document.getElementById('image-preview-container');
    const iframe = document.getElementById('preview-iframe');
    const title = document.getElementById('preview-word-title');
    title.innerText = `Bing 图片搜索: ${query}`;
    iframe.src = 'about:blank';
    setTimeout(() => {
        iframe.src = url;
    }, 10);

    updateStatus(`正在 Bing 搜索: ${query}`, true);
}
function closeImagePreview() {
    const container = document.getElementById('image-preview-container');
    const iframe = document.getElementById('preview-iframe');
