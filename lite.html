  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
  import { getDatabase, ref, set, get, child, onValue } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

  const firebaseConfig = {

  };

  const fbApp = initializeApp(firebaseConfig);
  const db = getDatabase(fbApp);

  // 1. 生成文档唯一 ID (基于字幕内容)
window.getDocId = function () {

    // ① 优先使用 URL 里的 customid（Anki 传入）
    const urlParams = new URLSearchParams(window.location.search);
    const customId = urlParams.get('customid');

    if (customId && customId.trim() !== "") {
        return "anki_" + customId.trim();
    }

    // ② 备用：使用正文前30字符生成
    const transcript = document.getElementById('transcript');
    if (!transcript) return null;

    const text = transcript.innerText.trim();
    if (!text) return null;

    try {
        return "vid_" + btoa(
            unescape(
                encodeURIComponent(text.substring(0, 30))
            )
        ).replace(/[/+=]/g, "");
    } catch(e) {
        return null;
    }
};

   window.getTopVisibleTime = function() {
      const container = document.querySelector('.transcript-container');
      const lines = document.querySelectorAll('.line');
      // 探测基准线：容器顶部向下偏移 10px，避免因滚动微差错过首行
      const containerRect = container.getBoundingClientRect();
      const probeY = containerRect.top + 10; 
  
      for (let line of lines) {
        const rect = line.getBoundingClientRect();
        // 只要该行的底部超过了探测线，它就是用户正在看的“首行”
        if (rect.bottom >= probeY) {
          return line.dataset.time;
        }
      }
      return 0;
    };

  window.syncUpload = async function() {
      const id = window.getDocId();
      if (!id || id === "default_video") return;
      const topTime = window.getTopVisibleTime(); 
      const transcriptHtml = document.getElementById('transcript').innerHTML;
      set(ref(db, 'video_sync/' + id), {
          topTime: topTime,           // 只有滚动位置
          htmlContent: transcriptHtml, // 只有加粗状态
          ts: Date.now()               // 操作时间
      });
      console.log("阅读进度已同步 (播放进度未上传)");
  };

  window.syncDownload = async function() {
      const id = window.getDocId();
      const snapshot = await get(child(ref(db), 'video_sync/' + id));
      if (snapshot.exists()) {
        const data = snapshot.val();
        if (data.htmlContent) {
          document.getElementById('transcript').innerHTML = data.htmlContent;
          rebindEvents(); 
        }
        if (data.videoProgress && Math.abs(video.currentTime - data.videoProgress) > 5) {
            video.currentTime = data.videoProgress;
        }
        if (data.topTime) {
          setTimeout(() => {
            const targetLine = document.querySelector(`.line[data-time="${data.topTime}"]`);
            if (targetLine) {
              const container = document.querySelector('.transcript-container');
              const offset = targetLine.offsetTop - 5;
              container.scrollTo({
                top: offset,
                behavior: 'smooth'
              });
              console.log("已恢复阅读进度至时间戳:", data.topTime);
            }
          }, 300); 
        }
      }
    };
</script>
<script>
    let scrollTimer = null;
    let controlsTimer = null;
    let isLongPress = false;
    let touchStartX = 0;
    let touchStartY = 0;
    const container = document.querySelector('.transcript-container');
    const SWIPE_THRESHOLD = 40; // 划动最小像素阈值
    const video = document.getElementById('videoPlayer');
    const touchOverlay = document.getElementById('video-touch-overlay');
    const transcript = document.getElementById('transcript');
    const status = document.getElementById('status');
    const dot = document.getElementById('dot');
    const videoHint = document.getElementById('video-hint');
    const transcriptContainer = document.querySelector('.transcript-container');
function toggleNativeControls() {
    const video = document.getElementById('videoPlayer');
    const touchOverlay = document.getElementById('video-touch-overlay');
    const btn = document.getElementById('toggle-controls-btn');
    if (controlsTimer) clearTimeout(controlsTimer);
    video.controls = true;
    touchOverlay.style.pointerEvents = 'none';
    btn.style.color = 'var(--primary)';
    btn.innerText = "🔒 控件已开";
    updateStatus("已唤起系统控件，5秒后自动关闭", true);
    controlsTimer = setTimeout(() => {
        video.controls = false;
        touchOverlay.style.pointerEvents = 'auto';
        btn.style.color = '';
        btn.innerText = "🛠️ 播放控件";
        updateStatus("已恢复纯净模式", true);
    }, 5000);
}
touchOverlay.addEventListener('touchstart', (e) => {
    touchStartX = e.touches[0].clientX;
    touchStartY = e.touches[0].clientY;
}, { passive: true });
touchOverlay.addEventListener('touchend', (e) => {
    const touchEndX = e.changedTouches[0].clientX;
    const touchEndY = e.changedTouches[0].clientY;
    const deltaX = touchEndX - touchStartX;
    const deltaY = touchEndY - touchStartY;
    if (Math.abs(deltaX) < 10 && Math.abs(deltaY) < 10) {
        if (video.paused) {
            video.play().catch(err => console.log("播放被拦截", err));
        } else {
            video.pause();
        }
    } else if (Math.abs(deltaX) > Math.abs(deltaY) * 1.5 && Math.abs(deltaX) > SWIPE_THRESHOLD) {
        if (deltaX < 0) {
            video.currentTime = Math.max(0, video.currentTime - 2);
        } else {
            video.pause();
        }
    }
});
touchOverlay.addEventListener('contextmenu', (e) => e.preventDefault());
container.addEventListener('scroll', () => {
    clearTimeout(scrollTimer);
    scrollTimer = setTimeout(() => {
        console.log("检测到滚动停止，同步位置到云端...");
        if (window.syncUpload) window.syncUpload();
    }, 1000); // 停止滚动 1 秒后上传
});
document.addEventListener('touchstart', (e) => {
    touchStartX = e.touches[0].clientX;
    touchStartY = e.touches[0].clientY;
}, { passive: true });
document.addEventListener('touchend', (e) => {
    const touchEndX = e.changedTouches[0].clientX;
    const touchEndY = e.changedTouches[0].clientY;
    const deltaX = touchEndX - touchStartX;
    const deltaY = touchEndY - touchStartY;
    if (Math.abs(deltaX) > Math.abs(deltaY) * 1.5 && Math.abs(deltaX) > SWIPE_THRESHOLD) {
        if (deltaX < 0) {
            video.currentTime = Math.max(0, video.currentTime - 2);
            updateStatus("⏪ 快退 2s", true);
        } else {
            if (video.paused) {
                video.play();
                updateStatus("▶️ 播放", true);
            } else {
                video.pause();
                updateStatus("⏸ 暂停", true);
            }
        }
        setTimeout(() => {
            const lastVideoName = localStorage.getItem('last_video_name');
            updateStatus(lastVideoName ? "视频已加载" : "准备就绪", true);
        }, 1000);
    }
}, { passive: true });
    transcriptContainer.addEventListener('scroll', () => {
    localStorage.setItem('last_scroll_pos', transcriptContainer.scrollTop);
});
    function updateStatus(msg, active = false) {
        status.innerText = msg;
        dot.className = active ? 'status-dot active' : 'status-dot';
    }
    window.addEventListener('DOMContentLoaded', () => {
        const cachedSubs = localStorage.getItem('last_subtitles');
        if (cachedSubs) {
            processSubtitleContent(cachedSubs, true);
        }
        const lastVideoName = localStorage.getItem('last_video_name');
        const lastTime = localStorage.getItem('last_video_time');
        if (lastVideoName) {
            let timeStr = lastTime ? ` (上次看到 ${formatTime(parseFloat(lastTime))})` : '';
            videoHint.innerText = `待加载: ${lastVideoName}${timeStr}`;
            videoHint.style.display = 'block';
        }
    });
video.addEventListener('pause', () => {
    if (window.syncUpload) {
        window.syncUpload();
        lastSyncTime = Date.now();
    }
});
    document.getElementById('videoInput').addEventListener('change', (e) => {
        const file = e.target.files[0];
        if (file) {
            localStorage.setItem('last_video_name', file.name);
            videoHint.style.display = 'none';
            video.src = URL.createObjectURL(file);
            updateStatus("视频已加载", true);
            video.addEventListener('loadeddata', function onLoaded() {
                const lastTime = localStorage.getItem('last_video_time');
                if (lastTime) {
                    console.log("恢复播放位置至:", lastTime);
                    video.currentTime = parseFloat(lastTime);
                }
                video.removeEventListener('loadeddata', onLoaded);
            });
        }
    });
document.getElementById('subtitleManualInput').addEventListener('change', (e) => {
    const file = e.target.files[0];
    if (file) {
        const reader = new FileReader();
        reader.onload = (event) => {
            const content = event.target.result;
            processSubtitleContent(content); 
            updateStatus("字幕已手动加载", true);
        };
        reader.readAsText(file);
    }
});
function processSubtitleContent(content, isFromCache = false) {
    if (!isFromCache) {
        localStorage.setItem('last_subtitles', content);
    }
    const cues = parseSubtitle(content);
    renderSubtitles(cues);
    const lastScrollPos = localStorage.getItem('last_scroll_pos');
    const lastTime = localStorage.getItem('last_video_time');
    setTimeout(() => {
        if (lastScrollPos) {
            transcriptContainer.scrollTop = parseFloat(lastScrollPos);
        } else if (lastTime) {
            const savedTime = parseFloat(lastTime);
            const lines = document.querySelectorAll('.line');
            for (let i = 0; i < lines.length; i++) {
                const start = parseFloat(lines[i].dataset.time);
                const next = lines[i+1] ? parseFloat(lines[i+1].dataset.time) : Infinity;
                if (savedTime >= start && savedTime < next) {
                    lines[i].classList.add('active');
                    lines[i].scrollIntoView({ behavior: 'auto', block: 'center' });
                    break;
                }
            }
        }
    }, 150); // 稍微延长延迟，确保 DOM 布局计算完成
    setTimeout(() => {
        if(window.syncDownload) window.syncDownload();
    }, 500);
}
function parseSubtitle(data) {
    let cleanData = data.replace(/<br\s*\/?>/gi, "\n")
                        .replace(/<\/p>|<\/div>/gi, "\n")
                        .replace(/<\/?[^>]+(>|$)/g, "");
    const doc = new DOMParser().parseFromString(cleanData, 'text/html');
    cleanData = doc.documentElement.textContent;
    const cues = [];
    const lines = cleanData.split('\n').map(l => l.trim()).filter(l => l !== "");
    for (let i = 0; i < lines.length; i++) {
        const line = lines[i];
        const timeMatch = line.match(/(\d{1,2}:\d{2}:\d{2}[.,]\d{3})\s*-->\s*(\d{1,2}:\d{2}:\d{2}[.,]\d{3})/);
        if (timeMatch) {
            const start = timeToSeconds(timeMatch[1]);
            let textParts = [];
            let j = i + 1;
            while (j < lines.length && !lines[j].match(/-->/)) {
                const contentLine = lines[j];
                if (!/^\d+$/.test(contentLine)) {
                    textParts.push(contentLine);
                }
                j++;
            }
            const text = textParts.join(' ').trim();
            if (text) {
                cues.push({ start, text });
            }
            i = j - 1; 
        }
    }
    return cues;
}
    function timeToSeconds(timeStr) {
        const parts = timeStr.trim().replace(',', '.').split(':');
        if (parts.length === 3) return (+parts[0]) * 3600 + (+parts[1]) * 60 + (+parts[2]);
        return (+parts[0]) * 60 + (+parts[1]);
    }

async function copyToClipboard(text, msg) {
    try {
        await navigator.clipboard.writeText(text);
        updateStatus(msg, true);
        setTimeout(() => updateStatus("视频已加载", true), 1500);
    } catch (err) {}
}

function boldSelectedText() {
    const selection = window.getSelection();
    if (!selection || selection.rangeCount === 0 || selection.isCollapsed) {
        updateStatus("请先选中单词", false);
        return;
    }
    const range = selection.getRangeAt(0);
    const container = range.commonAncestorContainer.nodeType === 3
        ? range.commonAncestorContainer.parentElement
        : range.commonAncestorContainer;
    if (!container.closest('.content')) {
        updateStatus("只能在字幕正文内操作", false);
        return;
    }
    const bolds = document.querySelectorAll('.custom-bold');
    let matchedBold = [];
    bolds.forEach(bold => {
        const boldRange = document.createRange();
        boldRange.selectNodeContents(bold);
        if (range.compareBoundaryPoints(Range.END_TO_START, boldRange) < 0 &&
            range.compareBoundaryPoints(Range.START_TO_END, boldRange) > 0) {
            matchedBold.push(bold);
        }
    });
    if (matchedBold.length > 0) {
        matchedBold.forEach(bold => {
            const parent = bold.parentNode;
            while (bold.firstChild) { parent.insertBefore(bold.firstChild, bold); }
            parent.removeChild(bold);
            parent.normalize();
        });
        updateStatus("已取消标记", true);
    } else {
        const span = document.createElement('span');
        span.className = 'custom-bold';
        try {
            const extracted = range.extractContents();
            span.appendChild(extracted);
            range.insertNode(span);
            updateStatus("已成功标记重点", true);
        } catch (e) {
            updateStatus("选区太复杂", false);
        }
    }
    selection.removeAllRanges();
    saveCurrentTranscript(); // 保存本地
    if (window.syncUpload) {
        window.syncUpload(); // 上传云端 (Firebase)
    }
}

video.addEventListener('timeupdate', () => {
    const currentTime = video.currentTime;
    const lines = document.querySelectorAll('.line');
    const floatingText = document.getElementById('current-floating-text');
    if (lines.length === 0) return;
    const firstLineStart = parseFloat(lines[0].dataset.time);
    const lastLine = lines[lines.length - 1];
    const lastLineEnd = parseFloat(lastLine.dataset.time) + 3; 
    if (currentTime > lastLineEnd || currentTime < firstLineStart - 1) {
        video.currentTime = firstLineStart;
        video.play().catch(() => {});
        updateStatus("🔄 已回到字幕区间", true);
        return; // 跳过本次后续逻辑，等待跳转完成
    }
    if (currentTime > 0) {
        localStorage.setItem('last_video_time', currentTime);
    }
    let currentLine = null;
    for (let i = 0; i < lines.length; i++) {
        const start = parseFloat(lines[i].dataset.time);
        const next = lines[i+1] ? parseFloat(lines[i+1].dataset.time) : lastLineEnd;

        if (currentTime >= start && currentTime < next) {
            currentLine = lines[i];
            break;
        }
    }
    if (currentLine) {
        if (!currentLine.classList.contains('active')) {
            document.querySelector('.line.active')?.classList.remove('active');
            currentLine.classList.add('active');
            currentLine.scrollIntoView({ behavior: 'smooth', block: 'center' });
        }
        if (floatingText) {
            const newContent = currentLine.querySelector('.content').innerHTML;
            if (floatingText.innerHTML !== newContent) {
                floatingText.innerHTML = newContent;
                floatingText.style.display = 'inline-block';
            }
        }
    } else {
        if (floatingText) {
            floatingText.style.display = 'none';
            floatingText.innerHTML = '';
        }
    }
