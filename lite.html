    import { getDatabase, ref, set, get, child, onValue } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

window.syncDownload = async function() {
    const id = window.getDocId();
    if (!id) return;

    try {
        const snapshot = await get(child(ref(db), 'video_reader_sync/' + id));
        if (snapshot.exists()) {
            const data = snapshot.val();
            
            // 1. 同步加粗索引
            if (data.boldIndices && Array.isArray(data.boldIndices)) {
                window.boldPositions = data.boldIndices;
                // 核心：下载完后立即去给已经生成的 HTML 上色
                if (typeof applyBoldFromPositions === 'function') {
                    applyBoldFromPositions();
                }
            }
            
            // 2. 同步滚动位置
            const transcript = document.getElementById('transcript');
            if (data.scrollPos !== undefined && !window.userIsScrolling && transcript) {
                setTimeout(() => {
                    transcript.scrollTop = data.scrollPos * (transcript.scrollHeight - transcript.clientHeight);
                    updateStatus("✨ 进度已同步", true);
                }, 300);
            }
        }
    } catch(e) {
        console.error("同步失败:", e);
    }
};
    // 从 URL 参数获取文档 ID
    window.getDocId = function() {
        const urlParams = new URLSearchParams(window.location.search);
        const customId = urlParams.get('customid');
        return (customId && customId.trim()) ? "anki_" + customId.trim() : null;
    };

    // ☁️ 上传：将加粗词的文本内容列表同步到云端
    window.syncUpload = async function() {
        const id = window.getDocId();
        if (!id) return;

        const transcript = document.getElementById('transcript');
        const scrollPercent = transcript.scrollTop / (transcript.scrollHeight - transcript.clientHeight || 1);

        try {
            await set(ref(db, 'video_reader_sync/' + id), {
                boldIndices: window.boldPositions || [], // 存储索引
                scrollPos: scrollPercent,
                ts: Date.now()
            });
            updateStatus("☁️ 进度已同步", true);
        } catch(e) { console.error(e); }
    };

    // 工具：在纯文本节点中找到匹配词并包裹 <span class="custom-bold">
    function wrapMatchingWords(container, boldSet) {
        // 已有加粗的先清除，重新标记
        container.querySelectorAll('.custom-bold').forEach(el => {
            el.replaceWith(document.createTextNode(el.textContent));
        });
        container.normalize();

        // 遍历文本节点，按词匹配
        const walker = document.createTreeWalker(container, NodeFilter.SHOW_TEXT);
        const nodesToProcess = [];
        let node;
        while ((node = walker.nextNode())) nodesToProcess.push(node);

        nodesToProcess.forEach(textNode => {
            const words = textNode.textContent.split(/(\s+)/);
            if (words.length <= 1) return;
            const frag = document.createDocumentFragment();
            words.forEach(part => {
                const clean = part.trim().replace(/[.,!?;:"]/g, '');
                if (boldSet.has(clean) && clean.length > 0) {
                    const span = document.createElement('span');
                    span.className = 'custom-bold';
                    span.textContent = part;
                    frag.appendChild(span);
                } else {
                    frag.appendChild(document.createTextNode(part));
                }
            });
            textNode.parentNode.replaceChild(frag, textNode);
        });
    }

    // 停止滚动 1.5s 后自动上传
    let scrollSyncTimer;
    document.getElementById('transcript').addEventListener('scroll', () => {
        clearTimeout(scrollSyncTimer);
        scrollSyncTimer = setTimeout(() => window.syncUpload(), 1500);
    });

// 修改后的初始化位置：加入 IndexedDB 自动拉取视频逻辑
window.addEventListener('load', async () => {
    // 1. 获取当前文档的唯一 ID (anki_xxxx)
    const id = typeof window.getDocId === 'function' ? window.getDocId() : null;
    
    // 2. 尝试从本地 IndexedDB 数据库找回视频文件
    let isVideoLoaded = false;
    if (id && typeof loadVideoFromLocal === 'function') {
        isVideoLoaded = await loadVideoFromLocal(id);
    }
    
    // 3. 如果本地库没找到，再显示待加载的文件名提示
    if (!isVideoLoaded) {
        const lastVideoName = localStorage.getItem('last_video_name');
        if (lastVideoName && videoHint) {
            videoHint.innerText = `待加载: ${lastVideoName}`;
            videoHint.style.display = 'block';
        }
    }

    // 4. 原有的 Firebase 同步逻辑（延时执行确保 UI 准备就绪）
    setTimeout(() => {
        if (window.syncDownload) window.syncDownload();     // 执行云端进度拉取
        if (window.startRealtimeSync) window.startRealtimeSync(); // 开启实时同步
    }, 1000);
});

    <!-- 视频本地持久化模块 (IndexedDB)专门用于在 iOS Anki 和 Mac Brave 中存储大体积视频文件 -->
<script>
    const VDB_NAME = "AnkiVideoDB";
    const V_STORE = "videos";
    const MAX_VIDEOS = 3; // 最多保留最近的 3 个视频，防止占用过多磁盘空间
    
    // 1. 初始化数据库
    function initVDB() {
        return new Promise((resolve, reject) => {
            const request = indexedDB.open(VDB_NAME, 2); // 版本 2
            request.onupgradeneeded = (e) => {
                const db = e.target.result;
                if (!db.objectStoreNames.contains(V_STORE)) {
                    db.createObjectStore(V_STORE); 
                }
            };
            request.onsuccess = (e) => resolve(e.target.result);
            request.onerror = (e) => reject(e.target.error);
        });
    }
    
    // 2. 保存视频（带自动清理逻辑）
    async function saveVideoToLocal(id, file) {
        if (!id) return;
        try {
            const db = await initVDB();
            const tx = db.transaction(V_STORE, "readwrite");
            const store = tx.objectStore(V_STORE);
    
            // 获取当前所有已存视频的 ID
            const keys = await new Promise(res => {
                const r = store.getAllKeys();
                r.onsuccess = () => res(r.result);
            });
    
            // 如果超出限制且不是覆盖旧视频，则删除最早的一个
            if (keys.length >= MAX_VIDEOS && !keys.includes(id)) {
                console.log("存储已满，清理旧缓存:", keys[0]);
                await store.delete(keys[0]);
            }
    
            // 写入新视频
            await store.put({
                blob: file,
                name: file.name,
                ts: Date.now()
            }, id);
            
            console.log(`✅ 视频已持久化: ${file.name}`);
            if(typeof updateStatus === 'function') updateStatus("💾 视频已同步至本地", true);
        } catch (e) {
            console.error("IndexedDB Save Error:", e);
        }
    }
    
 // 3. 读取并加载视频（优化内存管理版）
async function loadVideoFromLocal(id) {
    if (!id) return false;
    try {
        const db = await initVDB();
        const tx = db.transaction(V_STORE, "readonly");
        const store = tx.objectStore(V_STORE);
        
        const record = await new Promise(res => {
            const req = store.get(id);
            req.onsuccess = () => res(req.result);
        });

        if (record && record.blob) {
            const videoElement = document.getElementById('videoPlayer');
            if (!videoElement) return false;

            // --- 核心优化：释放旧的内存引用 ---
            // 如果当前已经有一个 blob 链接，先撤销它，防止内存泄漏
            if (videoElement.src && videoElement.src.startsWith('blob:')) {
                URL.revokeObjectURL(videoElement.src);
                console.log("♻️ 已释放旧视频内存占用");
            }

            // 生成新的本地访问链接
            const videoUrl = URL.createObjectURL(record.blob);
            videoElement.src = videoUrl;
            
            // UI 反馈
            const hint = document.getElementById('video-hint');
            if (hint) hint.style.display = 'none';
            if (typeof updateStatus === 'function') {
                updateStatus(`🎬 已自动加载本地缓存: ${record.name}`, true);
            }
            
            console.log(`✅ 成功从 IndexedDB 加载视频: ${record.name}`);
            return true;
        }
    } catch (e) {
        console.error("IndexedDB Load Error:", e);
    }
    return false;
}
</script>

<script>
    let touchStartX = 0, touchStartY = 0;
    let controlsTimer = null;

    // ✅ 用户主动滚动标志：防止 scrollIntoView 在用户操作时打断复制
    let userIsScrolling = false;
    let userScrollTimer = null;

    const SWIPE_THRESHOLD = 40;
    const video       = document.getElementById('videoPlayer');
    const transcript  = document.getElementById('transcript');
    const status      = document.getElementById('status');
    const dot         = document.getElementById('dot');
    const videoHint   = document.getElementById('video-hint');
    const transcriptContainer = document.querySelector('.transcript-container');
    const touchOverlay = document.getElementById('video-touch-overlay');

    // 监听用户主动滚动
transcriptContainer.addEventListener('scroll', () => {
    window.userIsScrolling = true;
    clearTimeout(userScrollTimer);
    userScrollTimer = setTimeout(() => { window.userIsScrolling = false; }, 3000);
});

    // ── 全局触摸：左划快退，右划播放/暂停 ──
    document.addEventListener('touchstart', (e) => {
        touchStartX = e.touches[0].clientX;
        touchStartY = e.touches[0].clientY;
    }, { passive: true });

    document.addEventListener('touchend', (e) => {
        // 有文字选中时不触发手势
        if (window.getSelection()?.toString().trim().length > 0) return;

        const dx = e.changedTouches[0].clientX - touchStartX;
        const dy = e.changedTouches[0].clientY - touchStartY;

        if (Math.abs(dx) > Math.abs(dy) * 1.5 && Math.abs(dx) > SWIPE_THRESHOLD) {
            if (dx < 0) {
                video.currentTime = Math.max(0, video.currentTime - 2);
                updateStatus("⏪ 快退 2s", true);
            } else {
                video.paused ? video.play() : video.pause();
                updateStatus(video.paused ? "⏸ 暂停" : "▶️ 播放", true);
            }
            setTimeout(() => {
                updateStatus(localStorage.getItem('last_video_name') ? "视频已加载" : "准备就绪", true);
            }, 1000);
        }
    }, { passive: true });

    // ── 状态栏更新（带自动恢复） ──
    function updateStatus(msg, active = false) {
        if (!status || !dot) return;
        status.innerText = msg;
        dot.className = active ? 'status-dot active' : 'status-dot';
        if (active && msg !== "视频已加载") {
            clearTimeout(window.statusTimer);
            window.statusTimer = setTimeout(() => {
                status.innerText = localStorage.getItem('last_video_name') ? "视频已加载" : "准备就绪";
                dot.className = 'status-dot active';
            }, 3000);
        }
    }

window.addEventListener('DOMContentLoaded', () => {
    const lastVideoName = localStorage.getItem('last_video_name');
    if (lastVideoName) {
        videoHint.innerText = `待加载: ${lastVideoName}`;

});

        };
        reader.readAsText(file);
    });

    // ── 字幕处理主流程 ──
function processSubtitleContent(content) {
    const cues = parseSubtitle(content);
    renderSubtitles(cues);
    if (typeof applyBoldFromPositions === 'function') {
        applyBoldFromPositions();
    }
    setTimeout(() => {
        if (window.syncDownload) window.syncDownload();
    }, 150);
}

    // ── SRT/VTT 解析 ──
    function parseSubtitle(data) {
        let clean = data
            .replace(/<br\s*\/?>/gi, "\n")
            .replace(/<\/p>|<\/div>/gi, "\n")
            .replace(/<\/?[^>]+(>|$)/g, "");
        clean = new DOMParser()
            .parseFromString(clean, 'text/html')
            .documentElement.textContent;

        const cues  = [];
        const lines = clean.split('\n').map(l => l.trim()).filter(Boolean);

        for (let i = 0; i < lines.length; i++) {
            const m = lines[i].match(
                /(\d{1,2}:\d{2}:\d{2}[.,]\d{3})\s*-->\s*(\d{1,2}:\d{2}:\d{2}[.,]\d{3})/
            );
            if (m) {
                const start = timeToSeconds(m[1]);
                let parts = [], j = i + 1;
                while (j < lines.length && !lines[j].match(/-->/)) {
                    if (!/^\d+$/.test(lines[j])) parts.push(lines[j]);
                    j++;
                }
                const text = parts.join(' ').trim();
                if (text) cues.push({ start, text });
                i = j - 1;
            }
        }
        return cues;
    }

    function timeToSeconds(s) {
        const p = s.trim().replace(',', '.').split(':');
        return p.length === 3
            ? +p[0] * 3600 + +p[1] * 60 + +p[2]
            : +p[0] * 60  + +p[1];
    }

    // ── 渲染字幕行 ──
 // 在全局作用域定义索引记录器，确保跨字幕行的索引是连续的
let globalWordCount = 0; 
window.boldPositions = []; // 存储加粗的索引数组

function renderSubtitles(cues) {
    const transcript = document.getElementById('transcript');
    transcript.innerHTML = '';
    globalWordCount = 0; 

    if (!cues || cues.length === 0) {
        transcript.innerHTML = '<div class="empty-state"><p>暂无字幕内容</p></div>';
        return;
    }

    // 预读当前的加粗位置，提升渲染性能
    const currentBolds = new Set(window.boldPositions || []);

    cues.forEach((cue, index) => {
        const div = document.createElement('div');
        div.className = 'line';
        div.dataset.time = cue.start;
        const nextTime = cues[index + 1] ? cues[index + 1].start : cue.start + 5;
        div.dataset.endTime = nextTime;

        const segments = cue.text.split(/([a-zA-Z]+|[\u4e00-\u9fa5]|[^\s\w\u4e00-\u9fa5]+)/g);
        
        let spansHtml = '';
        segments.forEach(seg => {
            if (!seg) return;
            if (/^\s+$/.test(seg)) {
                spansHtml += seg;
            } else {
                const idx = globalWordCount++;
                // 渲染时检查是否在加粗名单中
                const isBold = currentBolds.has(idx) ? 'custom-bold' : '';
                spansHtml += `<span class="word-span ${isBold}" data-index="${idx}">${seg}</span>`;
            }
        });

        div.innerHTML = `
            <div class="play-btn" title="播放本句">▶</div>
            <div class="content">${spansHtml}</div>
        `;

        // ... 事件绑定逻辑保持你原来的不变 ...
        const contentArea = div.querySelector('.content');
        let clickTimer = null;
        contentArea.onclick = (e) => {
            const target = e.target;
            if (!target.classList.contains('word-span')) return;
            if (clickTimer) {
                clearTimeout(clickTimer); clickTimer = null;
                const sel = window.getSelection();
                const range = document.createRange();
                range.selectNodeContents(contentArea);
                sel.removeAllRanges(); sel.addRange(range);
                copyToClipboard(cue.text, "已复制整句");
            } else {
                clickTimer = setTimeout(() => {
                    const word = target.innerText.trim().replace(/[.,!?;:"]/g, '');
                    if (word) {
                        const sel = window.getSelection();
                        const range = document.createRange();
                        range.selectNodeContents(target);
                        sel.removeAllRanges(); sel.addRange(range);
                        copyToClipboard(word, "已复制单词: " + word);
                    }
                    clickTimer = null;
                }, 250);
            }
        };

        div.querySelector('.play-btn').onclick = (e) => {
            e.stopPropagation();
            video.dataset.singlePlayMode = "true";
            video.dataset.stopAt = nextTime;
            video.currentTime = cue.start;
            video.play().catch(() => {});
            document.querySelector('.line.active')?.classList.remove('active');
            div.classList.add('active');
        };

        transcript.appendChild(div);
    });

    // --- 核心修复：渲染完成后强制刷一遍加粗 ---
    // 如果 Firebase 数据比渲染先到，这一步能保证颜色正确
    if (window.applyBoldFromPositions) {
        window.applyBoldFromPositions();
    }
}


    // ✅ 复制降级方案：clipboard API → execCommand（兼容 Anki WebView）
    async function copyToClipboard(text, msg) {
        try {
            if (navigator.clipboard?.writeText) {
                await navigator.clipboard.writeText(text);
            } else {
                const el = document.createElement('textarea');
                el.value = text;
                el.style.cssText = 'position:fixed;opacity:0;';
                document.body.appendChild(el);
                el.focus(); el.select();
                document.execCommand('copy');
                document.body.removeChild(el);
            }
            updateStatus(msg, true);
            setTimeout(() => updateStatus("视频已加载", true), 1500);
        } catch(err) {
            updateStatus("复制失败，请手动长按复制", false);
        }
    }

    // ── 定位当前播放行 ──
    function scrollToActive() {
        const line = document.querySelector('.line.active');
        if (line) {
            line.scrollIntoView({ behavior: 'smooth', block: 'center' });
            updateStatus("已定位到当前播放位置", true);
        } else {
            updateStatus("视频未在播放匹配的字幕行", false);
        }
    }

    // ── 加粗/取消加粗（来自文档2的 Range 方案，支持跨词操作） ──
    function boldSelectedText() {
    const sel = window.getSelection();
    if (!sel || sel.isCollapsed) {
        updateStatus("请先选中文字", false);
        return;
    }

    const range = sel.getRangeAt(0);
    const spans = document.querySelectorAll('.word-span');
    let selectedIndices = [];

    spans.forEach(span => {
        // 使用 intersectsNode 判断选区是否与单词节点相交
        // 这样即使只选中单词的一部分，或者没选后面的空格，也会被计入
        if (sel.containsNode(span, true)) {
            selectedIndices.push(parseInt(span.dataset.index));
        }
    });

    if (selectedIndices.length === 0) {
        updateStatus("只能在字幕正文内操作", false);
        return;
    }

    // 逻辑：如果选中的单词中有一个没加粗，则全部加粗；如果全都是加粗的，则取消加粗
    const anyNotBold = selectedIndices.some(idx => !window.boldPositions.includes(idx));

    if (anyNotBold) {
        selectedIndices.forEach(idx => {
            if (!window.boldPositions.includes(idx)) window.boldPositions.push(idx);
        });
        updateStatus("已成功标记重点", true);
    } else {
        window.boldPositions = window.boldPositions.filter(idx => !selectedIndices.includes(idx));
        updateStatus("已取消标记", true);
    }

    applyBoldFromPositions();
    
    // 操作完成后清除选区，防止视觉干扰
    sel.removeAllRanges();
    
    // 如果存在同步函数则触发
    if (window.syncUpload) window.syncUpload();
}

    // ── 格式化时间 ──
    function formatTime(s) {
        if (isNaN(s)) return "00:00";
        const h   = Math.floor(s / 3600);
        const m   = Math.floor((s % 3600) / 60);
        const sec = Math.floor(s % 60);
        const parts = [m.toString().padStart(2,'0'), sec.toString().padStart(2,'0')];
        if (h > 0) parts.unshift(h.toString().padStart(2,'0'));
        return parts.join(':');
    }

    // ── 唯一的 timeupdate 监听器 ──
    video.addEventListener('timeupdate', () => {
        const t = video.currentTime;
        const floatingText = document.getElementById('current-floating-text');

        // 单句播放模式：到达终点自动停止
        if (video.dataset.singlePlayMode === "true") {
            const stopAt = parseFloat(video.dataset.stopAt);
            if (t >= stopAt - 0.1) {
                video.pause();
                video.currentTime = stopAt - 0.1;
                video.dataset.singlePlayMode = "false";
                return;
            }
        }

        // 查找匹配行
        const lines = document.querySelectorAll('.line');
        let currentLine = null;
        for (let i = 0; i < lines.length; i++) {
            const start = parseFloat(lines[i].dataset.time);
            const next  = lines[i+1] ? parseFloat(lines[i+1].dataset.time) : Infinity;
            if (t >= start && t < next) { currentLine = lines[i]; break; }
        }

        if (currentLine) {
            if (!currentLine.classList.contains('active')) {
                document.querySelector('.line.active')?.classList.remove('active');
                currentLine.classList.add('active');
                // ✅ 只在用户未主动滚动时才自动跟随，不打断复制操作
                if (!userIsScrolling) {
                    currentLine.scrollIntoView({ behavior: 'smooth', block: 'center' });
                }
            }
            // 同步悬浮字幕
            if (floatingText) {
                const html = currentLine.querySelector('.content').innerHTML;
                if (floatingText.innerHTML !== html) {
                    floatingText.innerHTML = html;
                    floatingText.style.display = 'inline-block';
                }
            }
        } else {
            if (floatingText) {
                floatingText.style.display = 'none';
                floatingText.innerHTML = '';
            }
        }
    });
    
function applyBoldFromPositions() {
    const boldSet = new Set(window.boldPositions);
    document.querySelectorAll('.word-span').forEach(span => {
        const idx = parseInt(span.dataset.index);
        if (boldSet.has(idx)) {
            span.classList.add('custom-bold');
        } else {
            span.classList.remove('custom-bold');
        }
    });
}
    // ── postMessage 接收字幕（Anki iframe 通信） ──
    window.addEventListener('message', (event) => {
        if (event.data.type === 'LOAD_SUBTITLES') {
            processSubtitleContent(event.data.data);
        }
    });

    // ── Bing 图片搜索 ──
    function searchGoogleImages() {
        const selected = window.getSelection()?.toString().trim();
        if (!selected) { updateStatus("请先选中单词或短语", false); return; }

        const query = selected.replace(/[.,!?;:"]/g, '');
        const url   = `https://www.bing.com/images/search?q=${encodeURIComponent(query)}&adlt=strict&form=HDRSC2`;

        document.getElementById('preview-word-title').innerText = `Bing 图片: ${query}`;
        const iframe = document.getElementById('preview-iframe');
        iframe.src = 'about:blank';
        setTimeout(() => { iframe.src = url; }, 10);
        document.getElementById('image-preview-container').style.top = '35px';
        updateStatus(`正在 Bing 搜索: ${query}`, true);
    }

    function closeImagePreview() {
        document.getElementById('image-preview-container').style.top = '100%';
        setTimeout(() => {
            document.getElementById('preview-iframe').src = 'about:blank';
            updateStatus("视频已加载", true);
        }, 300);
    }

    // ── 临时唤起原生视频控件 ──
    function toggleNativeControls() {
        if (controlsTimer) clearTimeout(controlsTimer);
        video.controls = true;
        touchOverlay.style.pointerEvents = 'none';
        const btn = document.getElementById('toggle-controls-btn');
        btn.style.color = 'var(--primary)';
        btn.innerText = "🔒 控件已开";
        updateStatus("已唤起系统控件，5秒后自动关闭", true);
        controlsTimer = setTimeout(() => {
            video.controls = false;
            touchOverlay.style.pointerEvents = 'auto';
            btn.style.color = '';
            btn.innerText = "▶️ 控件";
            updateStatus("已恢复纯净模式", true);
        }, 5000);
    }

    // ── 遮罩层手势处理（点击播放/暂停，左划快退） ──
    touchOverlay.addEventListener('touchstart', (e) => {
        touchStartX = e.touches[0].clientX;
        touchStartY = e.touches[0].clientY;
    }, { passive: true });

    touchOverlay.addEventListener('touchend', (e) => {
        const dx = e.changedTouches[0].clientX - touchStartX;
        const dy = e.changedTouches[0].clientY - touchStartY;
        if (Math.abs(dx) < 10 && Math.abs(dy) < 10) {
            video.paused
                ? video.play().catch(err => console.log("播放被拦截", err))
                : video.pause();
        } else if (Math.abs(dx) > Math.abs(dy) * 1.5 && Math.abs(dx) > SWIPE_THRESHOLD) {
            if (dx < 0) {
                video.currentTime = Math.max(0, video.currentTime - 2);
                updateStatus("⏪ 快退 2s", true);
            } else {
                video.pause();
            }
        }
    });

    window.parent.postMessage({ type: 'PLAYER_READY' }, '*');
</script>
